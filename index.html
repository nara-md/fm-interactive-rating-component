<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend Mentor | Interactive Rating Component</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Overpass:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/styles/reset.css">
    <link rel="stylesheet" href="./assets/styles/style.css">
    <link rel="icon" type="image/png" href="./assets/images/favicon-32x32.png">
</head>

<body>
    <main>
        <div class="rating-card">
            <div class="rating-content">
                <div class="star">
                    <img src="./assets/images/icon-star.svg">
                </div>

                <h1>How did we do?</h1>
                <p>Please let us know how we did with your support request. All feedback is appreciated
                    to help us improve our offering!
                </p>
                <div id="rating">
                    <button class='rating' data-value="1">1</button>
                    <button class='rating' data-value="2">2</button>
                    <button class='rating' data-value="3">3</button>
                    <button class='rating' data-value="4">4</button>
                    <button class='rating' data-value="5">5</button>
                </div>
                <button id="submit" type="button">Submit</button>
            </div>
        </div>
    </main>

    <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/nara-md" rel="noopener noreferrer" target="_blank">Nara Mendes</a>.
  </footer>
    <script src="./assets/scripts/main.js"></script>
</body>

</html>
